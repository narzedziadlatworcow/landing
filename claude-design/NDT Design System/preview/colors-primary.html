<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.sw{border-radius:10px;padding:14px;border:1px solid hsl(283 68% 88%);display:flex;flex-direction:column;gap:6px;min-height:88px;justify-content:flex-end;}
.sw .name{font-size:12px;font-weight:600;}
.sw .hex{font-size:11px;font-family:var(--font-mono);opacity:.7;}
.sw .role{font-size:10px;opacity:.55;text-transform:uppercase;letter-spacing:.08em;}
.sw.light{color:var(--foreground);}
.sw.dark{color:#fff;}
</style></head><body>
<div class="row">
  <div class="sw dark" style="background:hsl(286 86% 57%);border-color:transparent;"><span class="role">primary</span><span class="name">Violet 500</span><span class="hex">hsl(286 86% 57%)</span></div>
  <div class="sw light" style="background:hsl(277 90% 61%);color:#fff;border-color:transparent;"><span class="role">ring</span><span class="name">Violet 550</span><span class="hex">hsl(277 90% 61%)</span></div>
  <div class="sw light" style="background:hsl(289 100% 97%);"><span class="role">secondary</span><span class="name">Lavender 50</span><span class="hex">hsl(289 100% 97%)</span></div>
  <div class="sw light" style="background:hsl(276 100% 96%);"><span class="role">accent</span><span class="name">Lavender 100</span><span class="hex">hsl(276 100% 96%)</span></div>
  <div class="sw light" style="background:hsl(285 100% 97%);"><span class="role">muted</span><span class="name">Lavender 75</span><span class="hex">hsl(285 100% 97%)</span></div>
  <div class="sw dark" style="background:hsl(266 51% 16%);border-color:transparent;"><span class="role">foreground</span><span class="name">Ink</span><span class="hex">hsl(266 51% 16%)</span></div>
</div>
</body></html>
