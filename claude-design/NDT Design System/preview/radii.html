<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.r{background:hsl(276 100% 96%);border:1px solid hsl(283 68% 88%);display:flex;align-items:flex-end;justify-content:center;padding:8px;min-height:88px;color:var(--foreground);font-family:var(--font-mono);font-size:11px;}
.r.xs{border-radius:var(--radius-xs);}
.r.sm{border-radius:var(--radius-sm);}
.r.md{border-radius:var(--radius);}
.r.lg{border-radius:var(--radius-lg);}
.r.xl{border-radius:var(--radius-xl);}
.r.full{border-radius:999px;}
</style></head><body>
<div class="row">
  <div class="r xs">6px · xs</div>
  <div class="r sm">8px · sm</div>
  <div class="r md">12px · md</div>
  <div class="r lg">16px · lg</div>
  <div class="r xl">20px · xl</div>
  <div class="r full">999 · full</div>
</div>
</body></html>
