<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans);color:var(--foreground);}
.spec{display:flex;flex-direction:column;gap:14px;}
.row{display:flex;align-items:baseline;gap:16px;border-bottom:1px dashed hsl(283 68% 88%);padding-bottom:10px;}
.label{width:88px;font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);}
.sample{flex:1;}
</style></head><body>
<div class="spec">
  <div class="row"><div class="label">h1 · 30/700</div><div class="sample"><h1 style="margin:0;">Zacznij za darmo</h1></div></div>
  <div class="row"><div class="label">h2 · 24/600</div><div class="sample"><h2 style="margin:0;">Wybierz swój plan</h2></div></div>
  <div class="row"><div class="label">h3 · 18/600</div><div class="sample"><h3 style="margin:0;">Znalezione inspiracje</h3></div></div>
  <div class="row"><div class="label">body · 14/400</div><div class="sample"><p style="margin:0;">Nisza, wartości, doświadczenia i misja — fundament, nie biurokracja.</p></div></div>
  <div class="row"><div class="label">small · 12</div><div class="sample"><small>$15 / miesiąc · ~65 zł / mies</small></div></div>
  <div class="row"><div class="label">eyebrow · 11</div><div class="sample"><span class="eyebrow">Pełny produkt na trial</span></div></div>
</div>
</body></html>
