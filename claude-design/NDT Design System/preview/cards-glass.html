<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background-color:#fff;background-image:url("../assets/ndtbg.svg"),linear-gradient(135deg,#dbeafe 0%,#ffffff 50%,#f3e8ff 100%);background-size:200%,cover;background-position:30% 30%,center;background-repeat:no-repeat;font-family:var(--font-sans);color:var(--foreground);display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.glass{background:hsl(0 0% 100% / 0.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid hsl(283 68% 88% / 0.3);box-shadow:0 4px 6px -1px hsl(283 68% 88% / 0.10),0 10px 15px -3px hsl(283 68% 88% / 0.15);border-radius:16px;padding:16px;min-height:120px;}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-foreground);margin-bottom:6px;}
.title{font-size:15px;font-weight:600;margin-bottom:4px;}
.desc{font-size:12.5px;color:var(--muted-foreground);line-height:1.5;}
.row{display:flex;gap:8px;margin-top:10px;}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:500;background:hsl(289 100% 97%);color:hsl(270 60% 30%);}
</style></head><body>
<div class="glass">
  <div class="eyebrow">Temat · 3 materiały</div>
  <div class="title">Jak nie dać się AI, czyli co jeszcze ma sens w marketingu 2026</div>
  <div class="desc">Research zakończony — gotowe do napisania.</div>
  <div class="row"><span class="pill">LinkedIn post</span><span class="pill">YouTube script</span></div>
</div>
<div class="glass">
  <div class="eyebrow">Inspiracja · YouTube</div>
  <div class="title">Najlepszy sposób na pomysły do treści</div>
  <div class="desc">Nikodem Rudziński · 12 min · 45k wyświetleń</div>
  <div class="row"><span class="pill">Zapisane</span><span class="pill">#pomysły</span></div>
</div>
</body></html>
