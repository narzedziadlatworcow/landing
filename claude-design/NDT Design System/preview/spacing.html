<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);color:var(--foreground);}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;align-items:end;}
.box{background:hsl(289 100% 97%);border:1px solid hsl(283 68% 88%);border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-family:var(--font-mono);font-size:9px;color:var(--muted-foreground);}
.s1{height:16px;}.s2{height:24px;}.s3{height:32px;}.s4{height:40px;}.s5{height:48px;}.s6{height:56px;}.s8{height:72px;}.s10{height:88px;}
</style></head><body>
<div class="grid">
  <div class="box s1">4</div>
  <div class="box s2">8</div>
  <div class="box s3">12</div>
  <div class="box s4">16</div>
  <div class="box s5">20</div>
  <div class="box s6">24</div>
  <div class="box s8">32</div>
  <div class="box s10">40</div>
</div>
</body></html>
