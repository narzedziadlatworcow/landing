<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.sw{border-radius:10px;padding:14px;min-height:88px;display:flex;flex-direction:column;gap:6px;justify-content:flex-end;border:1px solid hsl(283 68% 88%);}
.sw .name{font-size:12px;font-weight:600;}
.sw .hex{font-size:11px;font-family:var(--font-mono);opacity:.8;}
.sw .role{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.08em;}
</style></head><body>
<div class="row">
  <div class="sw" style="background:hsl(348 87% 60%);color:#fff;border-color:transparent;"><span class="role">destructive</span><span class="name">Rose</span><span class="hex">hsl(348 87% 60%)</span></div>
  <div class="sw" style="background:hsl(142 70% 45%);color:#fff;border-color:transparent;"><span class="role">success</span><span class="name">Emerald</span><span class="hex">hsl(142 70% 45%)</span></div>
  <div class="sw" style="background:hsl(283 68% 88%);"><span class="role">border</span><span class="name">Lavender 200</span><span class="hex">hsl(283 68% 88%)</span></div>
  <div class="sw" style="background:hsl(271 22% 48%);color:#fff;border-color:transparent;"><span class="role">muted-fg</span><span class="name">Plum 500</span><span class="hex">hsl(271 22% 48%)</span></div>
</div>
</body></html>
