<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{
    margin:0; padding:20px;
    background: radial-gradient(ellipse at 30% 20%, hsl(270 40% 14%) 0%, hsl(266 55% 8%) 55%, hsl(260 60% 5%) 100%);
    font-family: var(--font-sans);
    color: #fff;
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    grid-template-rows: auto auto;
    gap: 14px;
    min-height: 260px;
  }

  /* Hero — deep plum surface with the brand gradient as a contained glow, not flooding the whole card */
  .hero{
    grid-column: 1 / 2;
    grid-row: 1 / 3;
    position:relative;
    border-radius: 16px;
    padding: 22px;
    background:
      radial-gradient(circle at 25% 65%, hsla(286, 86%, 57%, 0.55) 0%, transparent 50%),
      radial-gradient(circle at 85% 30%, hsla(230, 80%, 55%, 0.45) 0%, transparent 55%),
      radial-gradient(circle at 70% 90%, hsla(320, 75%, 45%, 0.35) 0%, transparent 50%),
      linear-gradient(135deg, hsl(265 50% 18%) 0%, hsl(270 45% 12%) 100%);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    justify-content: space-between;
    border: 1px solid hsl(270 30% 28%);
    box-shadow: inset 0 1px 0 hsla(280, 50%, 70%, 0.15);
    min-height: 232px;
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(circle at 50% 140%, hsla(286, 90%, 60%, 0.25) 0%, transparent 60%);
    pointer-events:none;
  }
  .role{ font-size:10px; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color: hsl(280 40% 75%); }
  .hero h1{ margin:8px 0 0; font-size:44px; font-weight:800; letter-spacing:-0.03em; line-height:1; }
  .hero h1 .g{
    background: linear-gradient(100deg, #e9b8ff 0%, #ff9fd0 40%, #b8a5ff 70%, #9ec3ff 100%);
    -webkit-background-clip: text; background-clip:text; -webkit-text-fill-color: transparent;
  }
  .swatches{ display:flex; gap:6px; margin-top: 16px; position:relative; z-index:1;}
  .stop{
    flex:1; height:40px; border-radius:8px;
    display:flex; align-items:flex-end; padding:6px 8px;
    font-family: var(--font-mono); font-size:10px;
    color: hsla(0,0%,100%,0.9);
    box-shadow: 0 4px 14px -4px rgba(0,0,0,.5), inset 0 1px 0 hsla(0,0%,100%,.2);
  }

  /* Right column — smaller surface samples showing how gradient is *used* on surfaces */
  .sample{
    border-radius: 14px;
    padding: 14px;
    font-size: 12px;
    min-height: 108px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .s-logo{
    background: #fff;
    color: hsl(266 51% 16%);
    border: 1px solid hsl(283 68% 88%);
  }
  .s-logo .ring{
    width: 44px; height:44px; border-radius:50%;
    background: var(--brand-gradient);
    box-shadow: 0 4px 14px -2px hsla(286, 86%, 57%, 0.45);
  }
  .s-btn{
    background: hsl(265 40% 14%);
    border: 1px solid hsl(270 30% 26%);
  }
  .cta{
    display:inline-flex; align-items:center; gap:6px;
    height: 34px; padding: 0 14px; border-radius: 10px;
    background: linear-gradient(135deg, hsl(286 86% 57%) 0%, hsl(265 85% 58%) 100%);
    color:#fff; font-size:12px; font-weight:600;
    box-shadow: 0 4px 14px -2px hsla(286, 86%, 57%, 0.5), inset 0 1px 0 hsla(0,0%,100%,.25);
    width: max-content;
  }
  .sample .label{ font-size:10px; letter-spacing:.08em; text-transform:uppercase; opacity:.7; }
  .sample .cap{ font-size:11px; opacity:.65; }
</style></head>
<body>
  <div class="hero">
    <div>
      <span class="role">Brand gradient</span>
      <h1>Narzędzia dla&nbsp;<span class="g">Twórców</span></h1>
    </div>
    <div class="swatches">
      <div class="stop" style="background:#c700ff">#c700ff</div>
      <div class="stop" style="background:#ff0063">#ff0063</div>
      <div class="stop" style="background:#9b78ff">#9b78ff</div>
      <div class="stop" style="background:#2a78ff">#2a78ff</div>
    </div>
  </div>

  <div class="sample s-logo">
    <span class="label">Logo mark</span>
    <div class="ring"></div>
    <span class="cap">Na jasnej powierzchni — jako akcent</span>
  </div>

  <div class="sample s-btn">
    <span class="label" style="color:hsl(280 40% 75%)">Primary CTA</span>
    <span class="cta">Zacznij za darmo →</span>
    <span class="cap" style="color:hsl(280 15% 65%)">Kierunkowy, 135°, bez hot-pink</span>
  </div>
</body>
</html>
