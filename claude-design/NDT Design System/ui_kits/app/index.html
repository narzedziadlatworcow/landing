<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>NDT — UI Kit</title>
<link rel="stylesheet" href="kit.css">
<link rel="icon" href="../../assets/favicon.svg">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root" class="app-bg"></div>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Toolbar.jsx"></script>
<script type="text/babel" src="Inspiration.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

function App() {
  const KEY = "ndt-ui-kit-screen";
  const [screen, setScreen] = useState(() => localStorage.getItem(KEY) || "content");
  useEffect(() => { localStorage.setItem(KEY, screen); }, [screen]);

  return (
    <>
      <Toolbar active={screen} setActive={setScreen} onHome={()=>setScreen("content")}/>
      <main>
        {screen === "strategy"    && <Strategy/>}
        {screen === "inspiration" && <Inspiration/>}
        {screen === "content"     && <Content/>}
        {screen === "course"      && <Course/>}
        {screen === "pricing"     && <Pricing/>}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
