<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8"/>
<title>NDT — Narzędzia dla Twórców</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="Narzędzia dla Twórców — jedno miejsce do strategii marki, inspiracji i produkcji treści. Dla twórców na YouTube, Instagramie i TikToku."/>
<link rel="icon" href="assets/favicon.svg"/>
<link rel="stylesheet" href="landing.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Mockups.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Quotes.jsx"></script>
<script type="text/babel" src="DarkPoint.jsx"></script>
<script type="text/babel" src="Manifest.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="Course.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" src="Tweaks.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "headlineIdx": 0,
  "ctaText": "Zacznij od 199 zł"
}/*EDITMODE-END*/;

function App() {
  const [headlineIdx, setHeadlineIdx] = useState(TWEAKS.headlineIdx);
  const [ctaText, setCtaText] = useState(TWEAKS.ctaText);

  function persist(edits) {
    try { window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*"); } catch (e) {}
  }

  useEffect(() => {
    function handler(e) {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode")   document.getElementById("tw").classList.add("on");
      if (d.type === "__deactivate_edit_mode") document.getElementById("tw").classList.remove("on");
    }
    window.addEventListener("message", handler);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch (e) {}
    return () => window.removeEventListener("message", handler);
  }, []);

  const onCta = () => {
    const el = document.getElementById("pricing");
    if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: "smooth" });
  };

  return (
    <>
      <Nav ctaText={ctaText} onCta={onCta}/>
      <Hero headlineIdx={headlineIdx} ctaText={ctaText}/>
      <Quotes/>
      <DarkPoint/>
      <Manifest/>
      <HowItWorks/>
      <CourseSection/>
      <PricingSection/>
      <FAQ/>
      <FinalCTA/>
      <Footer/>
      <TweaksPanel
        headlineIdx={headlineIdx} setHeadlineIdx={setHeadlineIdx}
        ctaText={ctaText} setCtaText={setCtaText}
        persist={persist}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
