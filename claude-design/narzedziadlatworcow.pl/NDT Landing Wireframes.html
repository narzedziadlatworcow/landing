<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8"/>
<title>NDT — Landing · Wireframe</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" href="assets/favicon.svg"/>
<link rel="stylesheet" href="wireframe.css"/>
<style>
  html,body{margin:0;padding:0;height:100%;background:#eee7f3;font-family:"Inter",sans-serif;}
  #root{height:100vh;}
  /* Tweaks panel */
  .tw-panel{
    position:fixed; right:16px; bottom:16px; z-index:9999;
    width:280px; padding:16px; border-radius:12px;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
    border:1px solid #d9c8ea; box-shadow: 0 10px 30px rgba(43,22,69,0.15);
    font-family:"Inter",sans-serif; font-size:13px;
    display:none;
  }
  .tw-panel.on{display:block;}
  .tw-panel h4{margin:0 0 4px; font-size:14px;}
  .tw-panel label{display:block; font-size:11px; color:#6b5a87; margin:10px 0 4px; text-transform:uppercase; letter-spacing:0.06em; font-weight:600;}
  .tw-panel select, .tw-panel input[type=range]{width:100%; padding:6px 8px; border-radius:6px; border:1px solid #d9c8ea; font: inherit;}
  .tw-panel .row{display:flex; gap:8px; align-items:center;}
  .tw-panel .sub{font-size:11px; color:#8a7aa8; margin-top:2px;}
  .tw-panel .close{float:right; cursor:pointer; color:#8a7aa8;}
</style>
</head>
<body>
<div id="root"></div>

<div class="tw-panel" id="tw">
  <span class="close" onclick="document.getElementById('tw').classList.remove('on')">✕</span>
  <h4>Tweaks</h4>
  <div class="sub">Steruje wszystkimi wariantami naraz</div>
  <label>Headline</label>
  <select id="tw-headline">
    <option value="0">Nadaj treściom kierunek.</option>
    <option value="1">Od chaosu do spójnej marki.</option>
    <option value="2">Twój drugi mózg do tworzenia.</option>
    <option value="3">Zacznij tworzyć jak zawodowiec.</option>
  </select>
  <label>CTA primary</label>
  <select id="tw-cta">
    <option value="0">Dołącz do Discorda →</option>
    <option value="1">Zacznij za darmo →</option>
    <option value="2">Chcę early access →</option>
    <option value="3">Zobacz jak to działa →</option>
  </select>
  <label>Długość landingu</label>
  <div class="row">
    <input type="radio" name="len" id="len-long" value="long" checked/>
    <label for="len-long" style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:#2b1645;font-weight:500;">długi</label>
    <input type="radio" name="len" id="len-short" value="short" style="margin-left:12px;"/>
    <label for="len-short" style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;color:#2b1645;font-weight:500;">krótki</label>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wf-shared.jsx"></script>
<script type="text/babel" src="variant-a.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>
<script type="text/babel" src="variant-c.jsx"></script>
<script type="text/babel" src="variant-d.jsx"></script>
<script type="text/babel" src="variant-e.jsx"></script>
<script type="text/babel" src="variant-f.jsx"></script>
<script type="text/babel" src="variant-g.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "headlineIdx": 0,
  "ctaIdx": 0,
  "long": true
}/*EDITMODE-END*/;

function App() {
  const [headlineIdx, setHeadlineIdx] = useState(TWEAKS.headlineIdx);
  const [ctaIdx, setCtaIdx] = useState(TWEAKS.ctaIdx);
  const [long, setLong] = useState(TWEAKS.long);

  // Hook up tweaks UI
  useEffect(() => {
    const hEl = document.getElementById("tw-headline");
    const cEl = document.getElementById("tw-cta");
    hEl.value = headlineIdx;
    cEl.value = ctaIdx;
    const onH = e => { setHeadlineIdx(+e.target.value); persist({headlineIdx:+e.target.value}); };
    const onC = e => { setCtaIdx(+e.target.value); persist({ctaIdx:+e.target.value}); };
    const onLen = e => { const v = e.target.value === "long"; setLong(v); persist({long:v}); };
    hEl.addEventListener("change", onH);
    cEl.addEventListener("change", onC);
    document.querySelectorAll('input[name=len]').forEach(r => {
      r.checked = (r.value === "long") === long;
      r.addEventListener("change", onLen);
    });
    return () => {
      hEl.removeEventListener("change", onH);
      cEl.removeEventListener("change", onC);
    };
  }, [headlineIdx, ctaIdx, long]);

  function persist(edits) {
    try { window.parent.postMessage({type:'__edit_mode_set_keys', edits}, '*'); } catch(e){}
  }

  // Edit mode messaging
  useEffect(() => {
    function handler(e) {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') document.getElementById("tw").classList.add("on");
      if (d.type === '__deactivate_edit_mode') document.getElementById("tw").classList.remove("on");
    }
    window.addEventListener("message", handler);
    try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(e){}
    return () => window.removeEventListener("message", handler);
  }, []);

  const common = { headlineIdx, ctaIdx, long };

  return (
    <DesignCanvas
      title="NDT — Landing sprzedażowy · Wireframe B2C"
      subtitle="4 warianty side-by-side. Niski detal, wysoka eksploracja. Steruj tweakami (prawy dolny róg), aby porównać headline / CTA / długość."
      storageKey="ndt-wf-canvas"
    >
      <DCSection id="sec-g" title="Wariant G — Twój ułożony miks (E + F)">
        <DCArtboard id="G" label="G · 1E·2E·2F·4F·3F·5F·6E·7E" width={1120} height={4200}>
          <VariantG {...common}/>
        </DCArtboard>
      </DCSection>
      <DCSection id="sec-remix" title="Nowe propozycje — remix ulubionych sekcji">
        <DCArtboard id="E" label="E · Editorial — spokojny remix (B+A)" width={1120} height={3800}>
          <VariantE {...common}/>
        </DCArtboard>
        <DCArtboard id="F" label="F · Bold statement — odważny remix (C+B)" width={1120} height={4000}>
          <VariantF {...common}/>
        </DCArtboard>
      </DCSection>
      <DCSection id="sec-wireframes" title="Oryginalne 4 warianty (referencja)">
        <DCArtboard id="A" label="A · Centered hero · edukacyjny · długi" width={1120} height={4200}>
          <VariantA {...common}/>
        </DCArtboard>
        <DCArtboard id="B" label="B · Split hero · bento · średni" width={1120} height={3600}>
          <VariantB {...common}/>
        </DCArtboard>
        <DCArtboard id="C" label="C · Full-bleed gradient · zine · odważny" width={1120} height={4400}>
          <VariantC {...common}/>
        </DCArtboard>
        <DCArtboard id="D" label="D · Bento hero · produktowy · krótki" width={1120} height={2800}>
          <VariantD {...common} long={false}/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
